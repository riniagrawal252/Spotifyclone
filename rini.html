<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Your Favourite Music is Here</title>

    <!-- CSS -->
    <link rel="stylesheet" href="script.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- Navigation -->

    <nav>
        <ul>
            <li class="brand">
                <img src="logo.png" alt="Spotify Logo">
                Spotify
            </li>

            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <!-- Main Container -->

    <div class="container">

        <!-- Song List -->

        <div class="songList">

            <h1>Devotional Songs</h1>

            <div class="songItemContainer">

                <div class="songItem">
                    <img src="covers/1.jpg" alt="">

                        <span class="songName">Mor mukut sir kanan kundal</span>
                        <span class="songTime">
                            
                            <i class="far fa-play-circle btn"></i>
                        </span>
                    </div>
                </div>

                    <img src="covers/2.jpg" alt="">

                        <span class="songName">Yahi asha lekar ati hoon main - Bhajan</span>

                            <i class="far fa-play-circle btn"></i>

                    </div>
                </div>

                            <i class="far fa-play-circle btn"></i>

                    </div>

                            <i class="far fa-play-circle btn"></i>

                <div class="songItem">
                    <img src="covers/9.jpg" alt="">

                    <img src="covers/10.jpg" alt="">

            </div>

        </div>

    </div>

    <!-- Bottom Player -->

    <div id="bottom">

     <div class="progress-container">

    <span id="currentTime">0:00</span>

    <input type="range" id="myProgressBar" value="0" min="0" max="100">

    <span id="duration">0:00</span>

</div>
        <div class="icons">

            <div id="previous">
                <i class="fas fa-3x fa-step-backward"></i>
            </div>

            <div id="masterPlay">
                <i class="far fa-3x fa-play-circle"></i>
            </div>

            <div id="next">
                <i class="fas fa-3x fa-step-forward"></i>
            </div>

           

        </div>

        <div class="songInfo">

            <img src="playing.gif"
                width="42"
                id="gif"
                style="opacity:0; transition:opacity .4s ease;"
                alt="Playing">

            <span id="masterSongName">
                Mor mukut sir kanan kundal
            </span>
             <i class="fa-regular fa-heart" id="likeBtn"></i>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="script.js"></script>
